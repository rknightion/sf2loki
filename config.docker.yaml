# sf2loki config for local Docker / docker-compose runs.
# Non-secret values come from the environment (${VAR}, supplied via .env.dev or
# the compose env_file); secrets come from files mounted at /etc/sf2loki/secrets.
# Contains NO secrets itself, so it is safe to commit.

salesforce:
  login_url: ${SF_LOGIN_URL}                     # e.g. your My Domain URL (custom-URL path)
  client_id: ${SF_CLIENT_ID}                     # External Client App consumer key
  username: ${SF_USERNAME}                        # integration user (JWT `sub`); pre-authorised on the app
  private_key_file: /etc/sf2loki/secrets/server.key
  api_version: "60.0"
  # org_id omitted -> auto-resolved via /userinfo (needs the `openid` scope on the app).
  # Set SF_ORG_ID and add `org_id: ${SF_ORG_ID}` here to keep the app on `api` alone.

sources:
  # Login streams in real time via Pub/Sub; the whole rest of the mix comes from
  # the Hourly EventLogFile CSVs. Categories are kept disjoint (no "Login" in the
  # ELF list) so the either/or overlap guard is satisfied.
  pubsub:
    enabled: true
    topics: ["/event/LoginEventStream"]
    include: ["/event/*"]
  eventlog_objects:
    # Left off: the stored RTEM *Event objects (ApiEvent, ReportEvent, ...) are
    # Salesforce big objects — they reject ORDER BY ASC / FIELDS(ALL), which is
    # what this source builds, so polling them does not work. Near-real-time for
    # those categories is Pub/Sub streaming, not this.
    enabled: false
    objects:
      - {name: LoginEvent, timestamp_field: EventDate, poll_interval: 5m, lookback: 1h}
  eventlogfile:
    enabled: true
    interval: Hourly                                # this org generates Hourly files (Event Monitoring
                                                    # hourly is enabled). Hourly lands ~20-30 min after the
                                                    # hour closes — far fresher than Daily's ~24h+.
    # Broad mix for dashboard-building — everything the activity generator + normal
    # usage emit into hourly files. "Login" is deliberately absent (it arrives in
    # real time via Pub/Sub above; listing it here would trip the overlap guard).
    # ApexCallout / NamedCredential dominate volume (multi-MB files); drop them if
    # dev-stack ingest cost matters.
    event_types:
      - API
      - ApexCallout
      - ApexExecution
      - ApiTotalUsage
      - AsyncReportRun
      - AuraRequest
      - BulkApi
      - BulkApi2
      - CompositeApi
      - CompositeApiSubrequest
      - ContentDistribution
      - ContentDocumentLink
      - ContentTransfer
      - CSPViolation
      - DatabaseSave
      - DocumentAttachmentDownloads
      - ExternalODataCallout
      - LightningInteraction
      - LightningPageView
      - LightningPerformance
      - Logout
      - MetadataApiOperation
      - NamedCredential
      - OneCommerceUsage
      - PackageInstall
      - PermissionUpdate
      - Report
      - {name: ReportExport, structured_metadata_fields: [REPORT_ID], labels: [DELEGATED_USER]}
      - RestApi
      - Search
      - UiTelemetryNavigationTiming
      - UiTelemetryResourceTiming
      - UniqueQuery
      - URI
      - VisualforceRequest
      - WaveChange
      - WaveInteraction
      - WavePerformance
    poll_interval: 10m                              # hourly files appear ~hourly; 10m keeps pickup latency low
    lookback: 24h                                   # first run (no checkpoint): the org retains ~1.5 days of
                                                    # hourly files; 24h backfills the recent ones
    settle_window: 5m                               # skip files created within this grace window so a
                                                    # half-written hourly CSV isn't pulled mid-write
    download_max_age: 24h                            # abandon a file whose body keeps 404ing once older than
                                                    # this, so it can't wedge the checkpoint

sink:
  type: loki
  loki:
    url: ${GC_LOKI}                                # https://logs-prod-035.grafana.net/loki/api/v1/push
    tenant_id: ${GC_LOKI_USER}                     # 1644459
    auth_token_file: /etc/sf2loki/secrets/loki-token
    encoding: protobuf
    compression: snappy
    batch: {max_entries: 1000, max_bytes: 1048576, flush_interval: 1s, max_line_bytes: 262144}
    labels: {environment: dev}                      # job + sf_org_id added automatically
    structured_metadata_fields: [replay_id, schema_id, event_uuid, user_id, username, source_ip, session_key]

state:
  store: file
  file:
    path: /var/lib/sf2loki/state.json               # bind-mounted from ./state (see docker-compose.yml)

service:
  log_level: info
  log_format: json
  health_addr: ":8080"                              # /healthz, /readyz
  # Metrics are OTLP-push-native (no Prometheus scrape endpoint). The sf2loki_* +
  # salesforce_* metrics are pushed to Grafana Cloud over OTLP/HTTP.
  telemetry:
    enabled: true
    # GC_OTLP_ENDPOINT is the base (…/otlp); the exporter needs the full signal path.
    endpoint: ${GC_OTLP_ENDPOINT}/v1/metrics        # …/otlp/v1/metrics
    auth: basic
    basic_auth_user: ${GC_OTLP_USER}                # OTLP instance id (distinct from the Loki tenant)
    # token omitted -> reuses the Loki auth token (one Grafana Cloud access-policy
    # token covers Loki push + OTLP push on this stack).
    export_interval: 60s
