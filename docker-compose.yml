# Docker run for sf2loki — pulls the prebuilt image published to GHCR on every
# push to main (the `:main` edge tag). This is the deploy target (e.g. jules):
#
#   docker compose --env-file .env.dev pull        # fetch the latest :main
#   docker compose --env-file .env.dev up -d        # run it
#
# To build from local source instead (dev iteration), layer the build override:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
#
# Secrets are mounted read-only from ./secrets (gitignored); non-secret config
# values are interpolated from the env_file. config.docker.yaml carries no secrets.
services:
  sf2loki:
    # Pin a specific build with SF2LOKI_TAG=main-<sha> if you need to; defaults to
    # the rolling :main edge tag.
    image: ghcr.io/rknightion/sf2loki:${SF2LOKI_TAG:-main}
    pull_policy: always
    env_file:
      - .env.dev
    volumes:
      - ./config.docker.yaml:/etc/sf2loki/config.yaml:ro
      # The container runs as uid 10001: secret files must be readable by it
      # (e.g. `chmod 640` + group-readable). Root-owned chmod 0600 files make
      # the service crash-loop at startup with "permission denied".
      - ./secrets:/etc/sf2loki/secrets:ro
      # Durable checkpoint state (replay_id / watermark per source) survives
      # container recreation. The container runs as uid 10001, so ./state must
      # be writable by it: `mkdir -p state && chmod 777 state` (or chown 10001).
      - ./state:/var/lib/sf2loki
    command: ["--config", "/etc/sf2loki/config.yaml"]
    ports:
      # Loopback-only by default: the health endpoints are unauthenticated, so
      # don't expose them to the network. Change to "8080:8080" if an external
      # probe (load balancer, monitoring host) needs to reach them.
      - "127.0.0.1:8080:8080"   # /healthz, /readyz (metrics are OTLP-push, no scrape port)
    # Note: Docker does NOT restart a container because its HEALTHCHECK fails —
    # "unless-stopped" only covers process exit. Pair an unhealthy-state restart
    # with an orchestrator (ECS/K8s) or something like willfarrell/autoheal.
    restart: unless-stopped
