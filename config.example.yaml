# sf2loki example configuration.
#
# Precedence (highest first): env (SF2LOKI_* with __ nesting) > this file > defaults.
# ${VAR} placeholders below are interpolated from the environment at load time
# (missing var = fatal). Secrets are injected from *_file paths (k8s Secret
# mounts); a missing/unreadable secret file is fatal at startup too (no silent
# blanks, in either case).

salesforce:
  environment: production                       # production | sandbox — derives login_url; an explicit login_url below overrides it
  login_url: https://login.salesforce.com      # optional: derived from environment when omitted; set to a custom My Domain to override
  auth_mode: jwt_bearer                          # jwt_bearer (private key + cert) | client_credentials (consumer key + secret)
  client_id: ${SF_CLIENT_ID}                    # External Client App consumer key
  # client_secret_file: /etc/sf2loki/secrets/client-secret  # required when auth_mode: client_credentials
  username: svc@example.com                      # integration user (pre-authorised on the app's Policies tab)
                                                 # not needed when auth_mode: client_credentials
  private_key_file: /etc/sf2loki/secrets/server.key
                                                 # not needed when auth_mode: client_credentials
  api_version: "60.0"
  org_id: null                                   # set this to keep the app on the `api` scope alone;
                                                 # left null it is auto-resolved via /services/oauth2/userinfo
                                                 # (which then needs the `openid` scope)
  limits:
    enabled: false   # poll /services/data/vXX.0/limits → org-limit gauges (API usage, storage, streaming events, ...)
    poll_interval: 5m

sources:
  # Either/or per event category: ingest each category (Login, API, Report, ...)
  # from exactly ONE source. Streaming /event/LoginEventStream AND polling
  # LoginEvent AND pulling the "Login" EventLogFile are the SAME data — enabling
  # more than one for a category double-counts. A fail-fast guard refuses to
  # start on an overlap; set allow_overlap: true to ingest anyway (Loki then
  # drops byte-identical duplicates, best-effort).
  allow_overlap: false
  pubsub:
    enabled: true
    endpoint: api.pubsub.salesforce.com:7443
    default_num_requested: 100                   # flow-control batch size
    replay_preset: CUSTOM                         # falls back to LATEST when no stored replay_id
    topics:
      - /event/LoginEventStream
      - /event/ApiAnomalyEvent
    include: ["/event/*"]                          # operator inclusion/exclusion globs
    exclude: []
  eventlog_objects:
    # Poll stored event objects via SOQL. Use for categories you'd rather poll
    # than stream (or that have no stream). Do NOT also stream the same category.
    enabled: false
    objects:
      # durations accept shorthand (5m, 1h30m), ISO-8601 (PT5M), or plain seconds
      - {name: LoginEvent, timestamp_field: EventDate, poll_interval: 5m, lookback: 1h}
  eventlogfile:
    # EventLogFile (CSV) ingestion. ~70 event types; schema is read per-file.
    enabled: false
    interval: Hourly                              # Hourly (3-6h fresh) | Daily (>=1d) — pick ONE
    event_types:                                  # ELF EventTypes to ingest (required when enabled)
      # Each item is a bare string OR a per-type object. A bare string uses the
      # global structured_metadata_fields below and promotes no extra labels.
      - Login
      - API
      # Per-type object: override structured metadata and/or promote columns to
      # stream labels for just this type. structured_metadata_fields overrides
      # the global list (omit to inherit it; [] to suppress it). labels MUST be
      # LOW cardinality — each distinct value is a new Loki stream.
      - name: ReportExport
        structured_metadata_fields: [REPORT_ID, OWNER_ID]
        labels: [DELEGATED_USER]
    poll_interval: 1h                             # how often to list new files
    lookback: 24h                                 # initial window on first run (no checkpoint = "from now")
    timestamp_column: TIMESTAMP_DERIVED           # per-row event time column
    page_size: 1000                              # SOQL LIMIT for the file-listing query
    settle_window: 0s                             # skip files created within this grace window (avoids
                                                  # half-written Hourly CSVs); 0 = off. Use a few min for Hourly.
    download_max_age: 24h                          # abandon a file whose body keeps 404ing once older than
                                                  # this, so a permanently-missing file can't wedge the checkpoint

sink:
  type: loki
  loki:
    # Grafana Cloud:   https://logs-prod-xx.grafana.net/loki/api/v1/push  (+ tenant_id + auth_token)
    # Self-hosted:     http://loki:3100/loki/api/v1/push                  (+ tenant_id -> X-Scope-OrgID)
    # Local Alloy:     http://alloy:3100/loki/api/v1/push                 (no auth)
    url: https://logs-prod-xx.grafana.net/loki/api/v1/push
    tenant_id: "123456"
    auth_token_file: /etc/sf2loki/secrets/loki-token
    encoding: protobuf                            # protobuf (default) | json
    compression: snappy                           # snappy (protobuf) | gzip (json) | none
    batch:
      max_entries: 1000
      max_bytes: 1048576
      flush_interval: 1s
      max_line_bytes: 262144                      # per-line UTF-8 cap; oversized lines are
                                                  # truncated (with a marker) before push so one
                                                  # fat row can't 400 its batch. 0 disables.
                                                  # Mirror your Loki server's max_line_size.
    labels:
      environment: prod                           # job + sf_org_id are added automatically
    structured_metadata_fields:
      - replay_id
      - schema_id
      - event_uuid
      - user_id
      - username
      - source_ip
      - session_key

state:
  store: configmap                                # configmap (k8s-native, no PVC) | file
  configmap_name: sf2loki-state
  namespace: null                                 # null -> read from the in-cluster service account
  file:
    path: /var/lib/sf2loki/state.json             # only used when store: file

service:
  log_level: info
  log_format: json
  health_addr: ":8080"
  shutdown_grace: 25s
  telemetry:
    enabled: false                         # push all metrics via OTLP/HTTP
    endpoint: ""                           # e.g. https://otlp-gateway-<zone>.grafana.net/otlp/v1/metrics  (Grafana Cloud) or http://alloy:4318/v1/metrics
    auth: basic                            # basic | none
    # Basic-auth creds default to the Loki sink tenant_id/auth_token when blank
    # (Grafana Cloud uses one stack credential for Loki and OTLP). Override here if needed:
    basic_auth_user: ""
    # basic_auth_token_file: /etc/sf2loki/secrets/otlp-token
    headers: {}                            # extra headers merged on top
    export_interval: 60s
    resource_attributes: {}                # extra OTel resource attrs merged onto service.name/service.version
