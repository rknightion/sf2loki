        sample: 1.0  # Opt-in lossy volume control: keep fraction (0-1] of rows, deterministic by record Id hash (replay-stable). 1.0 keeps everything.
        big_object: false  # Set true for Salesforce Big Objects (the stored RTEM event family: LoginEvent, ApiEvent, FileEventStore, *EventStore, ...). Big Objects reject ORDER BY ASC, so the source drains them newest-first (ORDER BY timestamp_field DESC) with a ratcheting upper bound and re-sorts each cycle's window ascending before emitting. Leave false for standard and custom objects (LoginHistory, MyAudit__c), which use the ASC path.
    # Rules run on the decoded payload BEFORE field routing, label promotion,
    # and timestamp extraction — so redacting the timestamp column triggers the
    # timestamp-fallback path, and a ``drop_field`` of a label-promoted column
    # is rejected at load time (it would silently drop the label).
    transforms:  # Redaction/filter rules applied to each polled record before shaping (see TransformRule).
      - action: null  # hash (salted SHA-256 -> stable pseudonym) | mask (format-aware: emails keep the domain, IPv4 truncates to /24, else '***') | drop_field | drop_row (row filter via `match`) | regex_replace (pattern -> replacement). (required)
        fields: [SOURCE_IP, CLIENT_IP]  # Payload field names the action applies to (required for hash/mask/drop_field/regex_replace; not used by drop_row).
        match: {}  # drop_row only: drop rows where EVERY field equals (or glob-matches) its value, e.g. {EVENT_TYPE: Sites}.
        pattern: null  # regex_replace only: the regular expression to replace (must compile).
        replacement: ""  # regex_replace only: the replacement text (backrefs allowed).
        name: ""  # Optional stable rule name used as the `rule` metric label for drop_row counts; defaults to "<action>-<index>".
  # Salesforce exposes ~70 EventType values (query ``SELECT EventType FROM
  # EventLogFile``, or the EventType picklist, to see which your org actually
  # produces); schema is read per-file. This is the workhorse for breadth —
  # most activity only surfaces here, not as a streaming event.
