name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  gate:
    name: lint · type · test · proto-drift
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          activate-environment: true
          enable-cache: true

      - name: Sync (frozen)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy src

      - name: Tests
        run: uv run pytest -q

      - name: Proto stub drift
        run: |
          bash scripts/gen_proto.sh
          git diff --exit-code -- src/sf2loki/salesforce/_generated src/sf2loki/sinks/loki/_generated \
            || { echo "::error::Generated proto stubs are out of date. Run 'just proto' and commit."; exit 1; }

  docker-build-test:
    name: build image (amd64 smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and load image (amd64 only)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: sf2loki:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test image
        run: |
          # CLI responds (help overrides the default --config CMD; no network/secrets needed)
          docker run --rm sf2loki:test --help
          # image runs as the non-root sf2loki user
          docker run --rm --entrypoint whoami sf2loki:test | grep -qx sf2loki

  package:
    name: build & check dist
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          activate-environment: true
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build --out-dir dist

      - name: Check dist contents (stubs present; tests/deploy/docs/scratch absent)
        run: uv run --no-project python scripts/check_dist.py dist

  helm-chart:
    name: helm lint · template · validate
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: v0.6.7
          KUBECONFORM_SHA256: 95f14e87aa28c09d5941f11bd024c1d02fdc0303ccff3f6c22c2fbb42fb86e5b
        run: |
          curl -fsSL -o kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  kubeconform.tar.gz" | sha256sum -c -
          tar -xzf kubeconform.tar.gz kubeconform
          sudo install kubeconform /usr/local/bin/

      - name: Helm lint
        run: helm lint deploy/helm

      # Render the default install, the HA topology, and the all-extras permutation, then
      # schema-validate each against upstream Kubernetes (skipping CRDs the chart ships for
      # optional operators — ExternalSecret/SecretStore, and any CNI-specific policy).
      - name: Helm template + kubeconform validate
        run: |
          set -euo pipefail
          validate() {
            echo "::group::helm template $*"
            helm template sf2loki deploy/helm "$@" \
              | kubeconform -strict -summary -ignore-missing-schemas \
                  -kubernetes-version 1.29.0 \
                  -schema-location default
            echo "::endgroup::"
          }
          validate
          validate --set ha.enabled=true --set replicaCount=2 --set networkPolicy.enabled=true
          validate --set externalSecrets.enabled=true --set externalSecrets.aws.region=eu-west-1 \
            --set serviceAccount.esoName=sf2loki-eso --set secrets.create=true

      # The single-instance guard MUST fail the render for replicaCount>1 without ha.enabled.
      - name: Assert single-instance render guard fires
        run: |
          if helm template sf2loki deploy/helm --set replicaCount=2 >/dev/null 2>&1; then
            echo "::error::render guard did not fire: replicaCount>1 without ha.enabled should fail"
            exit 1
          fi
          echo "render guard fired as expected"

  # Single required status check for the branch ruleset (only this need be required).
  # if: always() + an explicit failure check so a failed/cancelled leg fails the gate.
  # Renovate automerge waits for this to go green.
  ci-success:
    name: ci-success
    runs-on: ubuntu-latest
    if: always()
    needs: [gate, docker-build-test, package, helm-chart]
    steps:
      - name: Fail if any required job did not pass
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled: ${{ join(needs.*.result, ', ') }}"
          exit 1
      - name: All required jobs passed
        run: echo "ci-success — ${{ join(needs.*.result, ', ') }}"
