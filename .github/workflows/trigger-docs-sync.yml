name: Trigger Documentation Sync

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'zensical.toml'
  workflow_dispatch:

# Dispatch is authenticated with DOCS_SYNC_PAT, not GITHUB_TOKEN — no token scopes needed.
permissions: {}

concurrency:
  group: docs-sync-${{ github.repository }}
  cancel-in-progress: true

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Trigger documentation sync in parent repo
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.DOCS_SYNC_PAT }}
          repository: rknightion/m7kni-net-site
          event-type: docs-update
          client-payload: '{"repository": "sf2loki"}'
