name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Minimal default; write scopes are granted per-job only where needed.
permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create release + tag
      pull-requests: write  # open/maintain the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # PAT (not GITHUB_TOKEN): bot-authored release PRs need a non-default-token
          # author for CI to run without manual approval.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    # Local trusted same-repo reusable; forwards the release tag so the shared
    # container-publish pipeline emits semver + latest image tags.
    uses: ./.github/workflows/docker.yml
    with:
      release-tag: ${{ needs.release-please.outputs.tag_name }}

  pypi-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    # PyPI Trusted Publishing (OIDC): no stored token. The publisher must be
    # registered on PyPI for repo rknightion/sf2loki, workflow release-please.yml,
    # environment "pypi". The GitHub environment can add required reviewers.
    environment:
      name: pypi
      url: https://pypi.org/p/sf2loki
    permissions:
      contents: read
      id-token: write  # mint the OIDC token PyPI verifies
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.14"
          activate-environment: true
          # No build cache in the publishing job: a poisoned cache must not be
          # able to taint the artifact we upload to PyPI (zizmor cache-poisoning).
          enable-cache: false

      - name: Build sdist + wheel
        run: uv build --out-dir dist

      - name: Verify dist contents before publish
        run: uv run --no-project python scripts/check_dist.py dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist
