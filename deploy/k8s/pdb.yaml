# With replicas: 1 and strategy Recreate, maxUnavailable: 1 lets voluntary
# disruptions (node drains) proceed — the pod reschedules and resumes from its
# last committed replay_id. minAvailable: 1 would instead block drains.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sf2loki
  labels:
    app.kubernetes.io/name: sf2loki
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sf2loki
