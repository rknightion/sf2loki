# Secrets mounted at /etc/sf2loki/secrets. Replace the placeholder values.
# Prefer an external secret manager (External Secrets Operator, Vault, SOPS)
# over committing this file with real values.
apiVersion: v1
kind: Secret
metadata:
  name: sf2loki-secrets
  labels:
    app.kubernetes.io/name: sf2loki
type: Opaque
stringData:
  # RSA private key matching the cert uploaded to the Connected App (JWT bearer).
  server.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME
    -----END PRIVATE KEY-----
  # Grafana Cloud access policy token (or self-hosted Loki token). Omit for Alloy.
  loki-token: REPLACE_ME
---
# Env-injected settings override YAML via the SF2LOKI_ prefix + __ nesting.
# SF2LOKI_SALESFORCE__CLIENT_ID maps to salesforce.client_id (the Connected App
# consumer key), keeping the secret out of the ConfigMap.
apiVersion: v1
kind: Secret
metadata:
  name: sf2loki-env
  labels:
    app.kubernetes.io/name: sf2loki
type: Opaque
stringData:
  SF2LOKI_SALESFORCE__CLIENT_ID: REPLACE_ME
