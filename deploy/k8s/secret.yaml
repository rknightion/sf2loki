# Secrets mounted at /etc/sf2loki/secrets. Replace the placeholder values.
# Prefer an external secret manager (External Secrets Operator, Vault, SOPS)
# over committing this file with real values.
apiVersion: v1
kind: Secret
metadata:
  name: sf2loki-secrets
  labels:
    app.kubernetes.io/name: sf2loki
type: Opaque
stringData:
  # RSA private key matching the cert uploaded to the Connected App (JWT bearer).
  server.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_ME
    -----END PRIVATE KEY-----
  # Grafana Cloud access policy token (or self-hosted Loki token). Omit for Alloy.
  loki-token: REPLACE_ME
---
# SF_CLIENT_ID is interpolated into config.yaml's ${SF_CLIENT_ID} placeholder
# at load time (sf2loki.config), keeping the Connected App consumer key out of
# the ConfigMap.
apiVersion: v1
kind: Secret
metadata:
  name: sf2loki-env
  labels:
    app.kubernetes.io/name: sf2loki
type: Opaque
stringData:
  SF_CLIENT_ID: REPLACE_ME
