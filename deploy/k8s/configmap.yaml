# Application config, mounted at /etc/sf2loki/config.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sf2loki-config
  labels:
    app.kubernetes.io/name: sf2loki
data:
  config.yaml: |
    salesforce:
      environment: production
      login_url: https://login.salesforce.com
      auth_mode: jwt_bearer
      # ${SF_CLIENT_ID} is interpolated from the pod env (sf2loki-env Secret) at load time.
      client_id: ${SF_CLIENT_ID}
      username: svc@example.com
      private_key_file: /etc/sf2loki/secrets/server.key
      api_version: "60.0"
      limits:
        enabled: false   # poll /services/data/vXX.0/limits → org-limit gauges
    sources:
      # Either/or per category: ingest each category from ONE source only.
      # A fail-fast guard rejects overlaps; allow_overlap bypasses it.
      allow_overlap: false
      pubsub:
        enabled: true
        topics:
          - /event/LoginEventStream
          - /event/ApiAnomalyEvent
        include: ["/event/*"]
      # EventLogFile (CSV) ingestion — alternative channel for ELF-only categories.
      # eventlogfile:
      #   enabled: true
      #   interval: Hourly        # Hourly | Daily (pick one)
      #   event_types:            # bare string, or {name, structured_metadata_fields?, labels?}
      #     - Report
      #     - {name: ApexExecution, structured_metadata_fields: [ENTRY_POINT], labels: [QUIDDITY]}
      #   poll_interval: 1h
      #   lookback: 24h
    sink:
      type: loki
      loki:
        url: https://logs-prod-xx.grafana.net/loki/api/v1/push
        tenant_id: "123456"
        auth_token_file: /etc/sf2loki/secrets/loki-token
        encoding: protobuf
        compression: snappy
        labels:
          environment: prod
        structured_metadata_fields: [replay_id, schema_id, user_id, username, source_ip, session_key]
        batch:
          max_line_bytes: 262144  # per-line cap; oversized lines truncated before push (0 disables)
    state:
      store: configmap
      configmap_name: sf2loki-state
    service:
      log_level: info
      log_format: json
      health_addr: ":8080"
      shutdown_grace: 25s
      telemetry:
        # OTLP metrics egress; basic-auth creds default to the Loki tenant_id/auth_token above when blank.
        enabled: false
        endpoint: ""  # e.g. https://otlp-gateway-<zone>.grafana.net/otlp/v1/metrics
---
# Pre-created (empty) ConfigMap holding resume state; the service RMWs it.
# Must exist before the pod starts (the store does not create it).
apiVersion: v1
kind: ConfigMap
metadata:
  name: sf2loki-state
  labels:
    app.kubernetes.io/name: sf2loki
data: {}
