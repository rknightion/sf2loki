# Optional: only needed if something in-cluster wants to reach the CURRENT
# leader's health endpoints (e.g. a synthetic check, or another controller).
# A ClusterIP Service selects Ready pods only, so it always routes to the
# leader (or a standalone instance) and never to a standing-by replica —
# that's what the readinessProbe split in deployment.yaml is for.
#
# Not required for the HA mechanism itself (that's entirely the Lease in
# rbac.yaml / coordinate.k8s_lease in config), and not for metrics (OTLP is
# push, not scrape — nothing to expose here for that). ClusterIP-only, same
# "don't expose the unauthenticated health endpoints" posture as the
# loopback-only port mapping in docker-compose.yml.
apiVersion: v1
kind: Service
metadata:
  name: sf2loki
  namespace: sf2loki
  labels:
    app: sf2loki
spec:
  type: ClusterIP
  selector:
    app: sf2loki
  ports:
    - name: health
      port: 8080
      targetPort: health
