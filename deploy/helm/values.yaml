      auth: basic  # Auth for the OTLP endpoint. "basic" sends Authorization: Basic base64(user:token); "none" sends none (e.g. in-cluster Alloy). For basic, the credentials default to the Loki sink's tenant_id/auth_token when left blank — Grafana Cloud uses one stack credential for both Loki and OTLP.
      basic_auth_user: ""  # Basic-auth username; defaults to the Loki sink's tenant_id when blank.
