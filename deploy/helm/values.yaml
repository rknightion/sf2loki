    shutdown_grace: 25s  # Grace period allowed for in-flight work to finish on shutdown.
    unready_after_sink_failing: 15m  # /readyz reports 503 when Loki pushes have been failing continuously for this long (data is retried and safe, but the instance is degraded and an orchestrator should surface it). 0 disables the readiness degradation.
    # When ``enabled`` is false, metrics are still recorded in-process (cheap,
