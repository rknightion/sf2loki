      lease_duration: 30s  # Lease lifetime: a standby takes over once the lease is this stale. Failover time is bounded by this.
      renew_interval: 10s  # How often the leader renews the Lease (must be < lease_duration/2).
      kubeconfig: null  # Path to a kubeconfig for out-of-cluster dev; omit to use in-cluster config.
  service:  # Application-level service settings.
