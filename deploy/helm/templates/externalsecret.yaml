{{- /*
External Secrets Operator wiring (opt-in, default OFF): a SecretStore pointing at a
cloud secrets manager, plus an ExternalSecret that BUILDS the mounted-file Secret
(sf2loki.secretName) from it. This is an alternative to secrets.create/secrets.data or
a hand-created secrets.existingSecret — pick exactly one strategy. Requires ESO already
installed in the cluster, and a workload-identity-annotated ServiceAccount provisioned
out-of-band (serviceAccount.esoName) with read access to the secrets manager.
*/ -}}
{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "sf2loki.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sf2loki.labels" . | nindent 4 }}
spec:
  provider:
    {{- if eq .Values.externalSecrets.provider "aws" }}
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.aws.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.serviceAccount.esoName }}
    {{- else if eq .Values.externalSecrets.provider "gcp" }}
    # NOTE: ESO's gcpsm workloadIdentity block can also take clusterProjectID /
    # clusterLocation / clusterName (only needed for cross-project GKE Workload
    # Identity Federation); this chart doesn't model those knobs yet — add them
    # here + to values.yaml if your setup needs cross-project WIF.
    gcpsm:
      projectID: {{ .Values.externalSecrets.gcp.projectID }}
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: {{ .Values.serviceAccount.esoName }}
    {{- end }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "sf2loki.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sf2loki.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}

  secretStoreRef:
    name: {{ include "sf2loki.fullname" . }}
    kind: SecretStore

  # Same name sf2loki.secretName resolves to elsewhere (secrets.existingSecret, or the
  # chart's own secret.yaml) — ESO creates/owns this Secret instead, so whichever
  # strategy is active, the Deployment's `secrets` volume (see deployment.yaml) always
  # mounts the same name.
  target:
    name: {{ include "sf2loki.secretName" . }}
    creationPolicy: Owner

  # Each entry maps a mounted-file key (the filename under /etc/sf2loki/secrets, e.g.
  # server.key, loki-token) to a remoteRef in the secrets manager. See values.yaml
  # externalSecrets.data for the shape and an example.
  data:
    {{- range .Values.externalSecrets.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        {{- toYaml .remoteRef | nindent 6 }}
    {{- end }}
{{- end }}
