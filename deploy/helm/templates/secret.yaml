{{- /*
Mounted-file secret (server.key / loki-token / client-secret / ...). sf2loki reads
secrets from FILES under /etc/sf2loki/secrets, never env vars — each key below becomes
a filename that must match the corresponding *_file path in `config` (e.g. server.key ->
/etc/sf2loki/secrets/server.key, loki-token -> /etc/sf2loki/secrets/loki-token).

Rendered only when secrets.create is true AND no existingSecret is set — i.e. this chart
owns the Secret. Set secrets.existingSecret to reference a Secret created out-of-band
instead (kubectl, external-secrets, sealed-secrets, ...), which skips this template
entirely (see sf2loki.secretName in _helpers.tpl).

Plaintext secret material in a values file is discouraged — it lands in `helm get
values`/release history/git in cleartext. Prefer, in order: externalSecrets.enabled (see
templates/externalsecret.yaml, builds this same Secret from a cloud secrets manager),
secrets.existingSecret (hand-create the Secret yourself), or `--set-file
secrets.data.server\.key=./server.key` (keeps the file out of a committed values.yaml).
*/ -}}
{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sf2loki.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sf2loki.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- toYaml .Values.secrets.data | nindent 2 }}
{{- end }}
