        refId: C
    noDataState: OK
    execErrState: Error
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "sum(sf2loki_leader) != 1 \u2014 no leader is ingesting, or two are."
      description: "Across all sf2loki replicas exactly one should hold leadership (sf2loki_leader ==\
        \ 1); a standalone instance always reports 1. Sustained 0 means no replica is ingesting (leaderless\
        \ \u2014 check lease-file storage reachability and replica logs); sustained 2+ means split-brain\
        \ (two leaders double-ingesting \u2014 check that both replicas point at the SAME lease file on\
        \ shared storage and that host clocks are NTP-synced)."
    isPaused: false
