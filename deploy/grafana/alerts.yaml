# Generated by deploy/grafana/gen_alerts.py — do not hand-edit.
# Regenerate with: python3 deploy/grafana/gen_alerts.py (or `just gen-grafana`).
apiVersion: 1
groups:
- orgId: 1
  name: sf2loki-data-loss
  folder: sf2loki
  interval: 1m
  rules:
  - uid: sf2loki-entries-dropped
    title: 'sf2loki: entries dropped (data loss)'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: ${DS_PROMETHEUS}
      model:
        editorMode: code
        expr: sum(rate(sf2loki_loki_entries_dropped_total[5m])) > 0
        instant: true
        range: false
        refId: A
    - refId: B
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: count
        refId: B
    - refId: C
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        refId: C
    noDataState: OK
    execErrState: Error
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: Log entries are being permanently dropped as undeliverable.
      description: 'Loki is rejecting entries the connector cannot retry (bad_request, e.g. outside the
        out-of-order window, or oversized_413). Every non-zero point here is real, permanent data loss.
        First response: check the dashboard''s ''Entries dropped rate by reason'' panel for the reason
        label, then check Loki-side limits (out-of-order window, max entry size) or reduce max_line_bytes
        if entries are oversized.'
    isPaused: false
  - uid: sf2loki-replay-fallback
    title: 'sf2loki: Pub/Sub replay fallback (possible gap)'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 7200
        to: 0
      datasourceUid: ${DS_PROMETHEUS}
      model:
        editorMode: code
        expr: sum(increase(sf2loki_pubsub_replay_fallbacks_total[1h])) > 0
        instant: true
        range: false
        refId: A
    - refId: B
      relativeTimeRange:
        from: 7200
        to: 0
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: count
        refId: B
    - refId: C
      relativeTimeRange:
        from: 7200
        to: 0
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        refId: C
    noDataState: OK
    execErrState: Error
    for: 0m
    labels:
      severity: critical
    annotations:
      summary: A Pub/Sub subscription restarted from a fallback replay position.
      description: "The topic's stored replay_id was invalid/expired, so the connector restarted the subscription\
        \ from a fallback replay preset \u2014 events between the last committed replay_id and the fallback\
        \ position may have been skipped for that topic. First response: identify the affected topic (label)\
        \ and, if the gap matters, backfill via SOQL/EventLogFile for that topic and time window."
    isPaused: false
- orgId: 1
  name: sf2loki-stalled
  folder: sf2loki
  interval: 1m
  rules:
  - uid: sf2loki-pushes-stalled
    title: 'sf2loki: pushes to Loki stalled'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: ${DS_PROMETHEUS}
      model:
        editorMode: code
        expr: (time() - sf2loki_last_push_success_timestamp_seconds > 900) and (sf2loki_queue_depth >
          0)
        instant: true
        range: false
        refId: A
    - refId: B
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: count
        refId: B
    - refId: C
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        refId: C
    noDataState: OK
    execErrState: Error
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: No successful Loki push in 15+ minutes while the queue is non-empty.
      description: "The connector hasn't successfully pushed to Loki in over 15 minutes while its internal\
        \ queue still holds data \u2014 the sink is failing, not just idle, and /readyz has likely flipped\
        \ to 503. First response: check Loki connectivity/auth (tenant_id, auth_token) and Loki-side health;\
        \ if Loki looks healthy, check for a stuck push (network partition, DNS)."
    isPaused: false
  - uid: sf2loki-stream-down
    title: 'sf2loki: Pub/Sub stream down'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: ${DS_PROMETHEUS}
      model:
        editorMode: code
        expr: min by (topic) (sf2loki_pubsub_stream_up) == 0
        instant: true
        range: false
        refId: A
    - refId: B
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: count
        refId: B
    - refId: C
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        refId: C
    noDataState: OK
    execErrState: Error
    for: 15m
    labels:
      severity: critical
    annotations:
      summary: A Pub/Sub topic's subscribe stream has been down for 15+ minutes.
      description: "sf2loki_pubsub_stream_up has been 0 for this topic for a sustained period \u2014 real-time\
        \ events for that topic are not flowing at all (short blips during normal stream churn are expected\
        \ and won't reach this duration). First response: check connector logs for that topic's reconnect/auth\
        \ errors and Salesforce Pub/Sub API status; restart the connector if it isn't self-recovering."
    isPaused: false
  - uid: sf2loki-watermark-stale
    title: 'sf2loki: polling watermark stale'
    condition: C
    data:
    - refId: A
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: ${DS_PROMETHEUS}
      model:
        editorMode: code
        expr: (time() - sf2loki_watermark_timestamp_seconds) > 14400
        instant: true
        range: false
        refId: A
    - refId: B
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: __expr__
      model:
        type: reduce
        expression: A
        reducer: count
        refId: B
    - refId: C
      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: __expr__
      model:
        type: threshold
        expression: B
        conditions:
        - evaluator:
            type: gt
            params:
            - 0
        refId: C
    noDataState: OK
    execErrState: Error
    for: 30m
    labels:
      severity: critical
    annotations:
      summary: A source/object's SOQL polling watermark hasn't advanced in 4+ hours.
      description: "sf2loki_watermark_timestamp_seconds for this source/object is over 4 hours old \u2014\
        \ 4x a typical 1h poll interval, well past a merely-delayed poll. That object's ingestion is effectively\
        \ stuck even if other panels look fine. First response: check 'SOQL poll errors rate' for that\
        \ source/object and the connector logs for the poller; verify the SOQL query/permissions are still\
        \ valid."
    isPaused: false
