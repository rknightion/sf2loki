    annotations:
      summary: p95 ingest lag has exceeded 6 hours, above normal EventLogFile latency.
      description: "p95 of sf2loki_ingest_lag_seconds has exceeded 6 hours \u2014 above the normal 3-6h\
        \ EventLogFile batch latency range, so the pipeline is meaningfully behind Salesforce's event\
        \ stream for at least one event type. First response: check the ingest-lag panel by event_type\
        \ to isolate which path (Pub/Sub real-time vs EventLogFile batch) is lagging, then check queue\
        \ depth / Loki push health for backpressure."
