      description: "The org is close to exhausting its DailyApiRequests limit for the day \u2014 continuing\
        \ at the current rate risks Salesforce hard-capping all further API calls today, which would stall\
        \ every SOQL-based source. First response: check the org limits dashboard row for which pollers\
        \ are consuming budget, and reduce poll frequency or event type scope until the daily limit resets."
