    annotations:
      summary: Salesforce REST calls are being rejected with REQUEST_LIMIT_EXCEEDED.
      description: 'The connector is hitting Salesforce API rate limits. First response: check the dashboard''s
        ''API usage % used by limit'' panel and consider raising poll intervals or requesting a higher
        Salesforce API limit allocation for the org.'
