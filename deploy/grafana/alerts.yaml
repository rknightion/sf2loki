      relativeTimeRange:
        from: 300
        to: 0
      datasourceUid: ${DS_PROMETHEUS}
      model:
        editorMode: code
        expr: sf2loki_salesforce_limit_remaining{limit_name="DailyApiRequests"} / sf2loki_salesforce_limit_max{limit_name="DailyApiRequests"}
          < 0.1
        instant: true
        range: false
        refId: A
    - refId: B
