# Managed by sf2loki. Apply the whole pack with:
#   gcx resources push -p deploy/grafana/rules/
# gcx reads ONE resource per file, so each rule is its own file.
# Datasource UIDs (grafanacloud-logs / grafanacloud-prom) are the Grafana Cloud
# defaults; on self-hosted Grafana, replace them with your Loki/Prometheus UIDs.
apiVersion: rules.alerting.grafana.app/v0alpha1
kind: AlertRule
metadata:
  name: sf2loki-apex-callout-error-rate
  annotations:
    grafana.app/folder: sf2loki
spec:
  title: sf2loki Apex callout error rate high
  trigger:
    interval: 60s
  for: 5m
  noDataState: Ok
  execErrState: Error
  labels:
    severity: warning
    service: sf2loki
  annotations:
    summary: Apex callout error rate above 10%
    description: Salesforce ApexCallout error rate is {{ $values.A.Value }}% over the last 10m.
  expressions:
    A:
      source: true
      datasourceUID: grafanacloud-logs
      queryType: instant
      relativeTimeRange:
        from: 10m
        to: 0s
      model:
        refId: A
        expr: sum(count_over_time({job="sf2loki", event_type="ApexCallout", source="eventlogfile"} | json s="SUCCESS" | s="0" [10m])) / sum(count_over_time({job="sf2loki", event_type="ApexCallout", source="eventlogfile"}[10m])) * 100
        queryType: instant
        datasource:
          type: loki
          uid: grafanacloud-logs
    C:
      datasourceUID: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        datasource:
          type: __expr__
          uid: __expr__
        conditions:
        - evaluator:
            type: gt
            params:
            - 10
