# Managed by sf2loki. Apply the whole pack with:
#   gcx resources push -p deploy/grafana/rules/
# gcx reads ONE resource per file, so each rule is its own file.
# Datasource UIDs (grafanacloud-logs / grafanacloud-prom) are the Grafana Cloud
# defaults; on self-hosted Grafana, replace them with your Loki/Prometheus UIDs.
apiVersion: rules.alerting.grafana.app/v0alpha1
kind: AlertRule
metadata:
  name: sf2loki-loki-push-failing
  annotations:
    grafana.app/folder: sf2loki
spec:
  title: sf2loki Loki push failing
  trigger:
    interval: 60s
  for: 5m
  noDataState: Ok
  execErrState: Error
  labels:
    severity: critical
    service: sf2loki
  annotations:
    summary: Loki push failure rate above 5%
    description: sf2loki Loki push failure rate is {{ $values.A.Value }}% over the last 5m.
  expressions:
    A:
      source: true
      datasourceUID: grafanacloud-prom
      relativeTimeRange:
        from: 10m
        to: 0s
      model:
        refId: A
        expr: sum(rate(sf2loki_loki_push_total{job="sf2loki", outcome!="success"}[5m])) / clamp_min(sum(rate(sf2loki_loki_push_total{job="sf2loki"}[5m])), 0.0001) * 100
        instant: true
        range: false
        datasource:
          type: prometheus
          uid: grafanacloud-prom
    C:
      datasourceUID: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        datasource:
          type: __expr__
          uid: __expr__
        conditions:
        - evaluator:
            type: gt
            params:
            - 5
