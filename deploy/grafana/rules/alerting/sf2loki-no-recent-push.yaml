# Managed by sf2loki. Apply the whole pack with:
#   gcx resources push -p deploy/grafana/rules/
# gcx reads ONE resource per file, so each rule is its own file.
# Datasource UIDs (grafanacloud-logs / grafanacloud-prom) are the Grafana Cloud
# defaults; on self-hosted Grafana, replace them with your Loki/Prometheus UIDs.
apiVersion: rules.alerting.grafana.app/v0alpha1
kind: AlertRule
metadata:
  name: sf2loki-no-recent-push
  annotations:
    grafana.app/folder: sf2loki
spec:
  title: sf2loki no recent Loki push
  trigger:
    interval: 60s
  for: 5m
  noDataState: Ok
  execErrState: Error
  labels:
    severity: critical
    service: sf2loki
  annotations:
    summary: No successful Loki push in 10m
    description: sf2loki last successful push was {{ $values.A.Value }}s ago (pipeline may be stalled).
  expressions:
    A:
      source: true
      datasourceUID: grafanacloud-prom
      relativeTimeRange:
        from: 10m
        to: 0s
      model:
        refId: A
        expr: time() - max(sf2loki_last_push_success_timestamp_seconds{job="sf2loki"})
        instant: true
        range: false
        datasource:
          type: prometheus
          uid: grafanacloud-prom
    C:
      datasourceUID: __expr__
      model:
        refId: C
        type: threshold
        expression: A
        datasource:
          type: __expr__
          uid: __expr__
        conditions:
        - evaluator:
            type: gt
            params:
            - 600
