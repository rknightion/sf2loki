# Managed by sf2loki. Apply the whole pack with:
#   gcx resources push -p deploy/grafana/rules/
# gcx reads ONE resource per file, so each rule is its own file.
# Datasource UIDs (grafanacloud-logs / grafanacloud-prom) are the Grafana Cloud
# defaults; on self-hosted Grafana, replace them with your Loki/Prometheus UIDs.
apiVersion: rules.alerting.grafana.app/v0alpha1
kind: RecordingRule
metadata:
  name: sf2loki-rec-apex-callout-errors-5m
  annotations:
    grafana.app/folder: sf2loki
spec:
  title: sf2loki Apex callout errors (5m)
  metric: sf2loki_apex_callout_errors:count5m
  targetDatasourceUID: grafanacloud-prom
  trigger:
    interval: 60s
  expressions:
    A:
      source: true
      datasourceUID: grafanacloud-logs
      queryType: instant
      relativeTimeRange:
        from: 5m
        to: 0s
      model:
        refId: A
        expr: sum(count_over_time({job="sf2loki", event_type="ApexCallout", source="eventlogfile"} | json s="SUCCESS" | s="0" [5m]))
        queryType: instant
        datasource:
          type: loki
          uid: grafanacloud-logs
